<!DOCTYPE html>
<!--
  BangKusTube Pro Max 💎

  Lisensi: Pake aja lah ribet amat, ini cuma kerangka doang kok buat nonton youtube selamat memakai awowkwok

  Bebas dipake, dimodif, dijual, dibakar, terserah.
  Kalo error jangan salahin yang bikin, salahin YouTube aja.
-->
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BangKusTube Premium Pro 💎</title>
  <style>
    :root {
      --bg: #f0f0; --card: #ffffff; --text: #333333; --btn: #db4437;
      --btn-hapus: #777777; --border: #ddd; --btn-biru: #4285f4;
      --btn-kuning: #f4b400; --btn-hijau: #0f9d58; --premium: #ffd700;
    }
    body.dark {
      --bg: #0f0f0f; --card: #212121; --text: #f1f1f1; --btn: #ff4d4d;
      --btn-hapus: #555555; --border: #444;
    }
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
      background: var(--bg); font-family: 'Segoe UI', Arial; flex-direction: column; padding: 20px 0; color: var(--text); transition: 0.3s;
    }
.login-button {
      width: 200px; height: 200px; border-radius: 50%; position: relative; cursor: pointer;
      background: conic-gradient(from 90deg, #db4437 0deg 120deg, #f4b400 120deg 240deg, #0f9d58 240deg 360deg);
      box-shadow: 0 8px 30px rgba(255,215,0,0.4); animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
      to { box-shadow: 0 8px 30px rgba(255,215,0,0.6); }
    }
.login-button::after {
      content: '💎'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; background: #4285f4; border-radius: 50%; border: 15px solid white;
      display: flex; align-items: center; justify-content: center; font-size: 35px;
    }
.login-form {
      display: none; background: var(--card); padding: 30px; border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-align: center; width: 280px;
    }
.login-form h2 { margin-top: 0; color: var(--text); }
.login-form input {
      width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px;
      box-sizing: border-box; background: var(--bg); color: var(--text); font-size: 16px;
    }
.login-form button {
      width: 100%; padding: 14px; background: linear-gradient(45deg, #4285f4, #0f9d58); color: white; border: none;
      border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;
    }
.halaman-yt { display: none; text-align: center; width: 95%; max-width: 1400px; }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
.logo-premium { font-size: 24px; font-weight: bold; background: linear-gradient(45deg, #ffd700, #ff4d4d);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stats { background: var(--card); padding: 8px 15px; border-radius: 20px; font-size: 14px; }
.input-area { margin: 15px 0; display: flex; gap: 8px; flex-wrap: wrap; }
.input-area input {
      flex: 1; min-width: 200px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text);
    }
.kotak-cari {
      width: 100%; padding: 12px; margin: 15px 0 5px 0; border: 2px solid #4285f4; border-radius: 8px;
      box-sizing: border-box; background: var(--card); color: var(--text); font-size: 15px;
    }
.btn { padding: 12px 18px; color: white; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.2s; }
.btn:active { transform: scale(0.95); }
.btn-simpan { background: var(--btn); }
.btn-keluar { background: var(--btn-hapus); }
.btn-mode { background: #4285f4; font-size: 18px; padding: 8px 12px; }
.btn-putar-semua { background: var(--btn-kuning); margin: 5px 0; }
.btn-export { background: var(--btn-hijau); }
.btn-import { background: var(--btn-biru); }
.btn-file { background: linear-gradient(45deg, #9c27b0, #e91e63); }
.action-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin: 10px 0; }
.video-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 15px;
    }
.item-video {
      background: var(--card); padding: 12px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: left; position: relative; transition: 0.3s;
    }
.item-video:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
.item-video.favorit { border: 2px solid var(--premium); }
.thumb-wrapper { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; cursor: pointer; min-height: 180px; }
.video-thumb,.item-video iframe,.item-video video,.item-video audio {
      width: 100%; border-radius: 10px; aspect-ratio: 16/9; object-fit: cover; display: block;
    }
.item-video audio { aspect-ratio: unset; height: 54px; margin: 10px 0; }
.badge-premium {
      position: absolute; top: 8px; left: 8px; background: var(--premium); color: #000;
      padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; z-index: 2;
    }
.badge-lokal {
      position: absolute; top: 8px; right: 8px; background: #9c27b0; color: #fff;
      padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; z-index: 2;
    }
.badge-error {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #ff4d4d; color: #fff; padding: 8px 12px; border-radius: 5px; font-size: 12px; z-index: 2;
    }
.judul-video {
      font-weight: bold; margin: 10px 0 5px 0; font-size: 15px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      cursor: pointer; min-height: 40px;
    }
.judul-video:hover { color: var(--btn-biru); }
.input-edit-judul {
      width: 100%; padding: 5px; margin: 5px 0; border: 1px solid var(--btn-biru); border-radius: 5px;
      background: var(--bg); color: var(--text); font-size: 14px; display: none;
    }
.item-video button {
      width: 31%; margin-top: 8px; padding: 9px 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-size: 13px;
    }
.btn-putar { background: var(--btn); }
.btn-stop { background: var(--btn-kuning); }
.btn-fav { background: var(--premium); color: #000; }
.btn-hapus { background: var(--btn-hapus); width: 100%!important; margin-top: 5px!important; }
.btn-yt { background: var(--btn-biru); width: 100%!important; margin-top: 5px!important; }
 #fileInput, #fileMedia { display: none; }
.loading { padding: 20px; text-align: center; grid-column: 1/-1; font-size: 18px; }
  </style>
</head>
<body>
  <div class="login-button" onclick="munculinForm()"></div>
  <div class="login-form" id="formLogin">
    <h2>💎 Login Premium</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="cekLogin()">Masuk BangKusTube</button>
  </div>
  <div class="halaman-yt" id="halamanYT">
    <div class="header-bar">
      <div class="logo-premium">BangKusTube Pro Max 💎</div>
      <div class="stats" id="statsVideo">Loading...</div>
      <button onclick="toggleMode()" class="btn btn-mode" id="tombolMode">🌙</button>
    </div>

    <div class="input-area">
      <input type="text" id="linkYoutube" placeholder="Tempel link YouTube / Shorts">
      <button onclick="simpanLink()" class="btn btn-simpan">💾 Simpan Link</button>
    </div>

    <input type="text" id="kotakCari" class="kotak-cari" onkeyup="cariVideo()" placeholder="🔍 Cari judul video...">

    <div class="action-bar">
      <button onclick="putarSemua()" class="btn btn-putar-semua">▶️ Putar Semua</button>
      <button onclick="document.getElementById('fileMedia').click()" class="btn btn-file">📁 Import File HP</button>
      <button onclick="exportData()" class="btn btn-export">📤 Export Backup</button>
      <button onclick="document.getElementById('fileInput').click()" class="btn btn-import">📥 Import Backup</button>
      <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
      <input type="file" id="fileMedia" accept="video/*,audio/*,image/*" multiple onchange="importFileLokal(event)">
    </div>

    <div id="listLink" class="video-grid"><div class="loading">⏳ Loading database...</div></div>
    <button onclick="logout()" class="btn btn-keluar" style="margin-top:20px;">🚪 Keluar</button>
  </div>

  <script>
    let dataVideo = [];
    let db;

    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('BangKusTubeDB', 1);
        request.onerror = () => reject('Browser kamu nggak support IndexedDB 😢 Pake Chrome ya!');
        request.onsuccess = (e) => {
          db = e.target.result;
          console.log('Database siap!');
          resolve();
        };
        request.onupgradeneeded = (e) => {
          db = e.target.result;
          if (!db.objectStoreNames.contains('files')) {
            db.createObjectStore('files', { keyPath: 'id' });
          }
        };
      });
    }

    if (localStorage.getItem('mode') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('tombolMode').innerText = '☀️';
    }

    function toggleMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('mode', document.body.classList.contains('dark')? 'dark' : 'light');
      document.getElementById('tombolMode').innerText = document.body.classList.contains('dark')? '☀️' : '🌙';
    }
    function munculinForm() {
      document.querySelector('.login-button').style.display = 'none';
      document.getElementById('formLogin').style.display = 'block';
    }
    async function cekLogin() {
      var user = document.getElementById('username').value;
      var pass = document.getElementById('password').value;
      if(user == "admin" && pass == "1234"){
        document.getElementById('formLogin').style.display = 'none';
        document.getElementById('halamanYT').style.display = 'block';
        try {
          await initDB();
          await loadData();
        } catch(err) {
          alert(err);
          document.getElementById('listLink').innerHTML = `<div class="loading">❌ ${err}</div>`;
        }
      } else {
        alert("Username atau password salah!");
      }
    }

    function getVideoId(link) {
      var videoId = '';
      if (link.includes('youtu.be/')) videoId = link.split('youtu.be/')[1].split('?')[0];
      else if (link.includes('v=')) videoId = link.split('v=')[1].split('&')[0];
      else if (link.includes('shorts/')) videoId = link.split('shorts/')[1].split('?')[0];
      return videoId;
    }

    async function loadData() {
      document.getElementById('listLink').innerHTML = '<div class="loading">⏳ Memuat file dari database...</div>';
      dataVideo = JSON.parse(localStorage.getItem('linkYT')) || [];

      dataVideo = dataVideo.filter(item => item);
      dataVideo.forEach(item => {
        if (!item.judul) item.judul = 'Tanpa Judul';
        if (!item.tipe) item.tipe = 'youtube';
      });

      const promises = dataVideo.map(async (item, index) => {
        if (item.tipe === 'lokal' && item.fileId && db) {
          await loadFileDariDB(index);
        }
      });
      await Promise.all(promises);

      tampilkanLink();
    }

    function loadFileDariDB(index) {
      return new Promise((resolve) => {
        if (!db) return resolve();
        const tx = db.transaction('files', 'readonly');
        const store = tx.objectStore('files');
        const req = store.get(dataVideo[index].fileId);
        req.onsuccess = () => {
          if (req.result) {
            dataVideo[index].url = URL.createObjectURL(req.result.blob);
          }
          resolve();
        };
        req.onerror = () => resolve();
      });
    }

    function saveData() {
      const dataToSave = dataVideo.map(item => {
        if(item.tipe === 'lokal') {
          return {...item, url: undefined};
        }
        return item;
      });
      localStorage.setItem('linkYT', JSON.stringify(dataToSave));
      updateStats();
    }

    function updateStats() {
      const yt = dataVideo.filter(v=>v.tipe!== 'lokal').length;
      const lokal = dataVideo.filter(v=>v.tipe === 'lokal').length;
      const fav = dataVideo.filter(v=>v.fav).length;
      document.getElementById('statsVideo').innerText = `YT: ${yt} | File: ${lokal} | ⭐ ${fav}`;
    }

    function simpanLink() {
      var link = document.getElementById('linkYoutube').value.trim();
      if(link == '') return alert('Linknya kosong kak!');
      var videoId = getVideoId(link);
      if(videoId == '') return alert('Link YouTube nggak valid!');

      dataVideo.push({ link: link, id: videoId, judul: 'Video YouTube', fav: false, tipe: 'youtube' });
      saveData();
      document.getElementById('linkYoutube').value = '';
      tampilkanLink();
    }

    async function importFileLokal(event) {
      const files = event.target.files;
      if(!files.length) return;
      if (!db) return alert('Database belum siap, tunggu 2 detik lalu coba lagi!');

      document.getElementById('listLink').innerHTML = '<div class="loading">⏳ Menyimpan file ke database...</div>';

      for (let file of files) {
        const fileId = 'file_' + Date.now() + '_' + Math.random();
        const tipeMedia = file.type.split('/')[0];

        await new Promise((resolve) => {
          const tx = db.transaction('files', 'readwrite');
          const store = tx.objectStore('files');
          store.put({ id: fileId, blob: file });
          tx.oncomplete = resolve;
          tx.onerror = () => { alert('Gagal simpen file: ' + file.name); resolve(); };
        });

        const url = URL.createObjectURL(file);
        dataVideo.push({
          judul: file.name,
          tipe: 'lokal',
          media: tipeMedia,
          fileId: fileId,
          url: url,
          fav: false
        });
      }

      saveData();
      tampilkanLink();
      alert(`${files.length} file berhasil disimpan permanen! 💎`);
      event.target.value = '';
    }

    function tampilkanLink() {
      var wadah = document.getElementById('listLink');
      wadah.innerHTML = '';
      if(dataVideo.length == 0){
        wadah.innerHTML = '<p style="grid-column: 1/-1;">Belum ada video. Tempel link atau import file kak! 💎</p>';
        updateStats();
        return;
      }
      dataVideo.forEach(function(item, index) {
        const judulAman = (item.judul || 'Tanpa Judul').toString();
        let thumbnail = '';
        let kontenMedia = '';
        let badgeLokal = '';

        if(item.tipe === 'lokal') {
          badgeLokal = '<div class="badge-lokal">📁 LOKAL</div>';
          if(!item.url) {
            thumbnail = '<div style="background:#333;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;aspect-ratio:16/9;"><div class="badge-error">❌ File Hilang</div></div>';
          } else if(item.media === 'video') {
            thumbnail = '<video src="' + item.url + '" class="video-thumb" preload="metadata"></video>';
          } else if(item.media === 'audio') {
            thumbnail = '<div style="background:linear-gradient(45deg,#9c27b0,#e91e63);height:100%;display:flex;align-items:center;justify-content:center;font-size:50px;">🎵</div>';
            kontenMedia = '<audio src="' + item.url + '" controls style="width:100%;margin-top:10px;"></audio>';
          } else if(item.media === 'image') {
            thumbnail = '<img src="' + item.url + '" class="video-thumb">';
          }
        } else {
          if(!item.id) return;
          thumbnail = '<img src="https://img.youtube.com/vi/' + item.id + '/hqdefault.jpg" class="video-thumb">';
        }

        wadah.innerHTML += `
          <div class="item-video ${item.fav? 'favorit' : ''}" id="video-${index}" data-judul="${judulAman.toLowerCase()}">
            <div class="thumb-wrapper" onclick="putarMedia(${index})">
              ${thumbnail}
              ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
              ${badgeLokal}
            </div>
            ${kontenMedia}
            <div class="judul-video" onclick="editJudul(${index})" id="judul-${index}">${judulAman}</div>
            <input type="text" class="input-edit-judul" id="input-judul-${index}" value="${judulAman}"
              onblur="simpanJudul(${index})" onkeypress="if(event.key==='Enter') simpanJudul(${index})">
            <button onclick="putarMedia(${index})" class="btn-putar">▶️ Putar</button>
            <button onclick="stopMedia(${index})" class="btn-stop">⏸️ Stop</button>
            <button onclick="toggleFavorit(${index})" class="btn-fav">${item.fav? '⭐' : '☆'}</button>
            ${item.tipe!== 'lokal'? `<a href="${item.link}" target="_blank" style="text-decoration:none;">
              <button class="btn btn-yt">🔗 Buka di YouTube</button>
            </a>` : ''}
            <button onclick="hapusLink(${index})" class="btn-hapus">🗑️ Hapus</button>
          </div>
        `;
      });
      updateStats();
    }

    function putarMedia(index) {
      const item = dataVideo[index];
      if(!item.url && item.tipe === 'lokal') return alert('File belum ke-load! Coba refresh atau import ulang.');
      const wrapper = document.getElementById(`video-${index}`).querySelector('.thumb-wrapper');

      if(item.tipe === 'lokal') {
        if(item.media === 'video') {
          wrapper.innerHTML = `
            <video src="${item.url}" class="video-thumb" controls autoplay></video>
            ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
            <div class="badge-lokal">📁 LOKAL</div>
          `;
        } else if(item.media === 'image') {
          wrapper.innerHTML = `
            <img src="${item.url}" class="video-thumb" style="object-fit:contain;max-height:500px;">
            ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
            <div class="badge-lokal">📁 LOKAL</div>
          `;
        }
      } else {
        wrapper.innerHTML = `
          <iframe src="https://www.youtube.com/embed/${item.id}?autoplay=1" frameborder="0" allowfullscreen></iframe>
          ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
        `;
      }
    }

    function stopMedia(index) {
      const item = dataVideo[index];
      const wrapper = document.getElementById(`video-${index}`).querySelector('.thumb-wrapper');

      if(item.tipe === 'lokal') {
        if(!item.url) {
          wrapper.innerHTML = '<div style="background:#333;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;aspect-ratio:16/9;"><div class="badge-error">❌ File Hilang</div></div>';
          return;
        }
        if(item.media === 'video') {
          wrapper.innerHTML = `
            <video src="${item.url}" class="video-thumb" preload="metadata"></video>
            ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
            <div class="badge-lokal">📁 LOKAL</div>
          `;
        } else if(item.media === 'image') {
          wrapper.innerHTML = `
            <img src="${item.url}" class="video-thumb">
            ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
            <div class="badge-lokal">📁 LOKAL</div>
          `;
        }
      } else {
        wrapper.innerHTML = `
          <img src="https://img.youtube.com/vi/${item.id}/hqdefault.jpg" class="video-thumb">
          ${item.fav? '<div class="badge-premium">⭐ FAVORIT</div>' : ''}
        `;
      }
    }

    function editJudul(index) {
      document.getElementById(`judul-${index}`).style.display = 'none';
      document.getElementById(`input-judul-${index}`).style.display = 'block';
      document.getElementById(`input-judul-${index}`).focus();
    }

    function simpanJudul(index) {
      var input = document.getElementById(`input-judul-${index}`);
      dataVideo[index].judul = input.value || 'Tanpa Judul';
      saveData();
      tampilkanLink();
    }

    function toggleFavorit(index) {
      dataVideo[index].fav =!dataVideo[index].fav;
      saveData();
      tampilkanLink();
    }

    function putarSemua() {
      if(dataVideo.length == 0) return alert('Belum ada video kak!');
      if(!confirm(`Mau putar ${dataVideo.length} video sekaligus? HP bisa nge-lag!`)) return;
      dataVideo.forEach((item, index) => putarMedia(index));
    }
    function cariVideo() {
      var kataKunci = document.getElementById('kotakCari').value.toLowerCase();
      document.querySelectorAll('.item-video').forEach(item => {
        var judulVideo = item.getAttribute('data-judul');
        item.style.display = judulVideo.includes(kataKunci)? 'block' : 'none';
      });
    }
    async function hapusLink(index) {
      if(!confirm('Yakin mau hapus?')) return;
      if(dataVideo[index].tipe === 'lokal' && dataVideo[index].fileId && db) {
        const tx = db.transaction('files', 'readwrite');
        tx.objectStore('files').delete(dataVideo[index].fileId);
      }
      if(dataVideo[index].url) URL.revokeObjectURL(dataVideo[index].url);
      dataVideo.splice(index, 1);
      saveData();
      tampilkanLink();
    }

    function exportData() {
      if(dataVideo.length == 0) return alert('Belum ada video buat di-export!');
      const dataStr = JSON.stringify(dataVideo, null, 2);
      const blob = new Blob([dataStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `BangKusTube_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if(!Array.isArray(imported)) throw 'Format salah';
          if(confirm(`Import ${imported.length} video? Data lama bakal ketimpa!`)) {
            dataVideo = imported;
            saveData();
            loadData();
            alert('Import berhasil! 💎');
          }
        } catch(err) {
          alert('File backup rusak / format salah!');
        }
      };
      reader.readAsText(file);
    }

    function logout() {
      document.getElementById('halamanYT').style.display = 'none';
      document.querySelector('.login-button').style.display = 'block';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('kotakCari').value = '';
    }
  </script>
</body>
  </html>
